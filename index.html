<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <title>Calculadora Sublimación DQDH</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 p-8">
        <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
            <h1 class="text-2xl font-bold mb-4">Calculadora de Costos y Ganancias</h1>
            <select id="producto" class="w-full p-2 border mb-4">
                <option>Selecciona un producto</option>
            </select>
            <input type="number" id="cantidad" placeholder="Cantidad" class="w-full p-2 border mb-4">
            <button onclick="calcular()" class="w-full bg-blue-500 text-white p-3 rounded">
                Calcular Precio
            </button>
            <div id="resultado" class="mt-4 p-4 bg-gray-200 hidden"></div>
        </div>
        <script src="app.js"></script>
    </body>
</html>
