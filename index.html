<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <title>Calculadora Sublimación DQDH</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
            <h1 class="text-2xl font-extrabold text-slate-800 mb-6 text-center">Calculadora DQDH</h1>

            <label class="block text-sm font-medium text-slate-600 mb-1">Productos</label>
            <select id="producto" class="w-full p-3 border border-slate-300 rounded-lg mb-4 focus:ring-2 focus:ring-blue-400 outline-none">
                <option value="">Selecciona un producto</option>
            </select>

            <label class="block text-sm font-medium text-slate-600 mb-1">Cantidad a producir</label>
            <input type="number" id="cantidad" placeholder="Ej: 10" class="w-full p-3 border border-slate-300 rounded-lg mb-6 focus:ring-2 focus:ring-blue-400 outline-none">

            <button onclick="calcular()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg">
                Calcular Resultados
            </button>

            <div id="resultado" class="mt-8 p-6 bg-slate-50 rounded-xl hidden border border-slate-200 space-y-3"></div>
        </div>
        <script src="app.js"></script>
    </body>
</html>
